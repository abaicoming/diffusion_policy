name: kuka_med7_real_image_6d

image_shape: [3, 240, 320]
dataset_path: /media/a6000-117/eee1def6-b942-4617-96a3-ba01a0d51657/xlh/diffusion_policy/data/my_task/kuka_dp_20260318_134100

shape_meta: &shape_meta
  obs:
    camera_0:
      shape: ${task.image_shape}
      type: rgb
    camera_1:
      shape: ${task.image_shape}
      type: rgb
    robot_eef_pose:
      shape: [6]
      type: low_dim
  action:
    shape: [6]

env_runner:
  _target_: diffusion_policy.env_runner.real_pusht_image_runner.RealPushTImageRunner

dataset:
  _target_: diffusion_policy.dataset.real_pusht_image_dataset.RealPushTImageDataset
  shape_meta: *shape_meta
  dataset_path: ${task.dataset_path}
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1+${n_latency_steps}'}
  pad_after: ${eval:'${n_action_steps}-1'}
  n_obs_steps: ${dataset_obs_steps}
  n_latency_steps: ${n_latency_steps}
  use_cache: True
  seed: 42
  val_ratio: 0.05
  max_train_episodes: null
  delta_action: False
